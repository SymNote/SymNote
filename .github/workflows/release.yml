name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Build the fat jar from source
  # ─────────────────────────────────────────────────────────────────────────
  build-jar:
    name: Build fat jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make scripts executable
        run: chmod +x generate.sh package.sh

      - name: Generate ANTLR parser
        run: ./generate.sh

      - name: Build fat jar
        run: ./package.sh

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: symnote-jar
          path: symnote.jar
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Package Linux installers (deb + rpm)
  # ─────────────────────────────────────────────────────────────────────────
  package-linux:
    name: Package Linux installers
    runs-on: ubuntu-22.04
    needs: build-jar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: symnote-jar
          path: dist/

      - name: Resolve package version
        id: version
        run: |
          RAW="${GITHUB_REF_NAME#v}"
          # RPM forbids hyphens in version strings — replace with tilde (pre-release marker)
          SAFE_VERSION="${RAW//-/\~}"
          echo "SAFE_VERSION=$SAFE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Package .deb
        run: |
          jpackage \
            --type deb \
            --input dist/ \
            --name symnote \
            --main-jar symnote.jar \
            --main-class Main \
            --add-modules java.base,java.desktop,java.logging,java.xml \
            --app-version ${{ steps.version.outputs.SAFE_VERSION }} \
            --linux-shortcut \
            --resource-dir packaging/linux \
            --dest packages/

      - name: Package .rpm
        run: |
          jpackage \
            --type rpm \
            --input dist/ \
            --name symnote \
            --main-jar symnote.jar \
            --main-class Main \
            --add-modules java.base,java.desktop,java.logging,java.xml \
            --app-version ${{ steps.version.outputs.SAFE_VERSION }} \
            --linux-shortcut \
            --resource-dir packaging/linux \
            --dest packages/

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: packages/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Create GitHub Release
  # ─────────────────────────────────────────────────────────────────────────
  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: package-linux
    permissions:
      contents: write

    steps:
      - name: Resolve version for release notes
        id: version
        run: |
          RAW="${GITHUB_REF_NAME#v}"
          echo "SAFE_VERSION=${RAW//-/\~}" >> "$GITHUB_OUTPUT"

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: symnote-jar
          path: release/

      - name: Download Linux packages
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          body: |
            ## Installation

            ### Linux — Native Installer (recommended, no Java required)

            **Debian / Ubuntu:**
            ```bash
            sudo apt install ./symnote_${{ steps.version.outputs.SAFE_VERSION }}_amd64.deb
            ```

            **Fedora / RHEL:**
            ```bash
            sudo rpm -i symnote-${{ steps.version.outputs.SAFE_VERSION }}-1.x86_64.rpm
            ```

            After installation, run:
            ```bash
            symnote my_song.symnote
            ```

            ### All platforms — JAR (requires JRE 17+)
            ```bash
            java -jar symnote.jar my_song.symnote
            ```
