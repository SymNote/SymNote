name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Build the fat jar from source
  # ─────────────────────────────────────────────────────────────────────────
  build-jar:
    name: Build fat jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make scripts executable
        run: chmod +x generate.sh package.sh

      - name: Generate ANTLR parser
        run: ./generate.sh

      - name: Build fat jar
        run: ./package.sh

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: symnote-jar
          path: symnote.jar
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2a: Package .deb on Ubuntu
  # ─────────────────────────────────────────────────────────────────────────
  package-deb:
    name: Package .deb installer
    runs-on: ubuntu-22.04
    needs: build-jar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y fakeroot

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: symnote-jar
          path: dist/

      - name: Resolve package version
        id: version
        run: |
          RAW="${GITHUB_REF_NAME#v}"
          echo "SAFE_VERSION=${RAW//-/\~}" >> "$GITHUB_OUTPUT"

      - name: Package .deb
        run: |
          jpackage \
            --type deb \
            --input dist/ \
            --name symnote \
            --main-jar symnote.jar \
            --main-class Main \
            --add-modules java.base,java.desktop,java.logging,java.xml \
            --app-version ${{ steps.version.outputs.SAFE_VERSION }} \
            --linux-shortcut \
            --resource-dir packaging/linux/deb \
            --dest packages/

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: packages/*.deb
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2b: Package .rpm on Fedora
  # ─────────────────────────────────────────────────────────────────────────
  package-rpm:
    name: Package .rpm installer
    runs-on: ubuntu-latest
    needs: build-jar
    container:
      image: fedora:38

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install JDK and RPM tools
        run: dnf install -y java-21-openjdk-devel java-21-openjdk java-21-openjdk-jmods rpm-build

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: symnote-jar
          path: dist/

      - name: Resolve package version
        id: version
        run: |
          RAW="${GITHUB_REF_NAME#v}"
          echo "SAFE_VERSION=${RAW//-/\~}" >> "$GITHUB_OUTPUT"

      - name: Package .rpm
        run: |
          jpackage \
            --type rpm \
            --input dist/ \
            --name symnote \
            --main-jar symnote.jar \
            --main-class Main \
            --add-modules java.base,java.desktop,java.logging,java.xml \
            --app-version ${{ steps.version.outputs.SAFE_VERSION }} \
            --linux-shortcut \
            --resource-dir packaging/linux/rpm \
            --dest packages/

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: packages/*.rpm
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Create GitHub Release
  # ─────────────────────────────────────────────────────────────────────────
  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: [package-deb, package-rpm]
    permissions:
      contents: write

    steps:
      - name: Resolve version for release notes
        id: version
        run: |
          RAW="${GITHUB_REF_NAME#v}"
          echo "SAFE_VERSION=${RAW//-/\~}" >> "$GITHUB_OUTPUT"

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: symnote-jar
          path: release/

      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: release/

      - name: Download .rpm artifact
        uses: actions/download-artifact@v4
        with:
          name: rpm-package
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          body: |
            ## Installation

            ### Linux — Native Installer (recommended, no Java required)

            **Debian / Ubuntu:**
            ```bash
                        sudo apt install ./symnote_${{ steps.version.outputs.SAFE_VERSION }}_amd64.deb
            ```

                        **Fedora / RHEL:**
            ```bash
                        sudo rpm -i symnote-${{ steps.version.outputs.SAFE_VERSION }}-1.x86_64.rpm
            ```

                        After installation, run:
            ```bash
                        symnote my_song.symnote
            ```

                        ### All platforms — JAR (requires JRE 17+)
            ```bash
                        java -jar symnote.jar my_song.symnote
            ```
