name: CI - JUnit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Make scripts executable
      run: chmod +x generate.sh test.sh

    - name: Generate ANTLR parser
      run: ./generate.sh

    - name: Run SymNote Tests
      run: ./test.sh
